name: Build Blender Addon

on:
  push:
    branches: [main]
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      # ── Vulkan SDK ──────────────────────────────────────────────
      - name: Install Vulkan SDK
        run: |
          $ver = "1.3.290.0"
          $url = "https://sdk.lunarg.com/sdk/download/$ver/windows/VulkanSDK-$ver-Installer.exe"
          Invoke-WebRequest -Uri $url -OutFile VulkanSDK.exe
          Start-Process -FilePath .\VulkanSDK.exe -Args "--accept-licenses --default-answer --confirm-command install" -Wait
          echo "VULKAN_SDK=C:\VulkanSDK\$ver" >> $env:GITHUB_ENV
          echo "C:\VulkanSDK\$ver\Bin" >> $env:GITHUB_PATH

      # ── Download DLSS DLLs from NVIDIA repo ─────────────────────
      - name: Download DLSS DLLs
        shell: bash
        run: |
          DLSS_BASE="https://github.com/NVIDIA/DLSS/raw/main/lib/Windows_x86_64/rel"
          mkdir -p vendor_dlls
          curl -sL -o vendor_dlls/nvngx_dlss.dll  "$DLSS_BASE/nvngx_dlss.dll"
          curl -sL -o vendor_dlls/nvngx_dlssd.dll "$DLSS_BASE/nvngx_dlssd.dll"
          ls -lh vendor_dlls/

      # ── Build ignis_rt.dll ──────────────────────────────────────
      - name: Configure CMake
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      # ── Package addon zip ───────────────────────────────────────
      - name: Assemble addon directory
        shell: bash
        run: |
          mkdir -p staging/ignis_rt/lib
          mkdir -p staging/ignis_rt/shaders

          # Python addon files + manifest + assets
          cp blender/ignis_rt/*.py   staging/ignis_rt/
          cp blender/ignis_rt/blender_manifest.toml staging/ignis_rt/ 2>/dev/null || true
          cp -r blender/ignis_rt/icons staging/ignis_rt/ 2>/dev/null || true

          # DLL (built)
          cp build/Release/ignis_rt.dll staging/ignis_rt/lib/

          # Vendor DLLs (DLSS SR + RR)
          cp vendor_dlls/nvngx_dlss.dll  staging/ignis_rt/lib/
          cp vendor_dlls/nvngx_dlssd.dll staging/ignis_rt/lib/

          # NRD DLL + composite shader (from repo lib/)
          cp blender/ignis_rt/lib/NRD.dll          staging/ignis_rt/lib/ 2>/dev/null || true
          cp blender/ignis_rt/lib/nrd_composite.spv staging/ignis_rt/lib/ 2>/dev/null || true

          # Compiled shaders
          cp shaders/*.spv staging/ignis_rt/shaders/
          mkdir -p staging/ignis_rt/shaders/wavefront
          cp shaders/wavefront/*.spv staging/ignis_rt/shaders/wavefront/ 2>/dev/null || true

      # ── Inject version from release tag into manifest ──────────
      - name: Inject release version
        if: github.event_name == 'release'
        shell: bash
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          echo "Injecting version $VERSION into manifest"
          sed -i "s/^version = .*/version = \"$VERSION\"/" staging/ignis_rt/blender_manifest.toml

      - name: Create zip
        shell: bash
        run: |
          cd staging
          7z a -tzip ../ignis_rt_addon.zip ignis_rt/

      # ── Upload artifact (always — nightly or release) ──────────
      - name: Upload addon zip
        uses: actions/upload-artifact@v4
        with:
          name: ignis-rt-blender-addon
          path: ignis_rt_addon.zip

      # ── Attach zip to GitHub Release ───────────────────────────
      - name: Upload release asset
        if: github.event_name == 'release'
        shell: bash
        run: gh release upload "${{ github.event.release.tag_name }}" ignis_rt_addon.zip --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
