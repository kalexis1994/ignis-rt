name: Build Blender Addon

on:
  push:
    branches: [main]
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      # ── Vulkan SDK ──────────────────────────────────────────────
      - name: Install Vulkan SDK
        run: |
          $ver = "1.3.290.0"
          $url = "https://sdk.lunarg.com/sdk/download/$ver/windows/VulkanSDK-$ver-Installer.exe"
          Invoke-WebRequest -Uri $url -OutFile VulkanSDK.exe
          Start-Process -FilePath .\VulkanSDK.exe -Args "--accept-licenses --default-answer --confirm-command install" -Wait
          echo "VULKAN_SDK=C:\VulkanSDK\$ver" >> $env:GITHUB_ENV
          echo "C:\VulkanSDK\$ver\Bin" >> $env:GITHUB_PATH

      # ── DLSS SDK (headers + lib + runtime DLLs) ────────────────
      - name: Clone DLSS SDK (v310.5.3 — DLSS 4 Super Resolution + Ray Reconstruction)
        shell: bash
        run: |
          git clone --depth 1 --branch v310.5.3 https://github.com/NVIDIA/DLSS.git vendor/DLSS
          ls vendor/DLSS/include/
          ls vendor/DLSS/lib/Windows_x86_64/x64/nvsdk_ngx_d.lib
          ls -lh vendor/DLSS/lib/Windows_x86_64/rel/

      # ── Prepare NGX SDK layout for CMake ───────────────────────
      # CMake expects: NGX_ROOT/include/ngx/*.h + NGX_ROOT/lib/nvsdk_ngx_d.lib
      - name: Prepare NGX SDK layout
        shell: bash
        run: |
          mkdir -p vendor/ngx_sdk/include/ngx
          mkdir -p vendor/ngx_sdk/lib
          cp vendor/DLSS/include/*.h vendor/ngx_sdk/include/ngx/
          cp vendor/DLSS/lib/Windows_x86_64/x64/nvsdk_ngx_d.lib vendor/ngx_sdk/lib/
          echo "--- NGX SDK layout ---"
          find vendor/ngx_sdk -type f | head -20

      # ── Streamline SDK (Frame Generation + Reflex) ────────────
      # Binaries are only in GitHub Release zips, not in the git repo
      - name: Download Streamline SDK (v2.10.3 — DLSS-G Frame Generation + Reflex)
        shell: bash
        run: |
          SL_VER="v2.10.3"
          SL_URL="https://github.com/NVIDIA-RTX/Streamline/releases/download/${SL_VER}/streamline-sdk-${SL_VER}.zip"
          echo "Downloading Streamline SDK ${SL_VER}..."
          curl -L -o streamline-sdk.zip "$SL_URL"
          mkdir -p vendor/_sl_tmp
          7z x streamline-sdk.zip -ovendor/_sl_tmp -y
          # The zip may contain a root folder — flatten to vendor/Streamline
          if [ -d "vendor/_sl_tmp/streamline-sdk-${SL_VER}" ]; then
            mv "vendor/_sl_tmp/streamline-sdk-${SL_VER}" vendor/Streamline
          else
            mv vendor/_sl_tmp vendor/Streamline
          fi
          rm -rf vendor/_sl_tmp
          echo "--- Streamline SDK contents ---"
          ls vendor/Streamline/include/sl.h
          ls vendor/Streamline/lib/x64/sl.interposer.lib
          ls -lh vendor/Streamline/bin/x64/sl.interposer.dll
          ls -lh vendor/Streamline/bin/x64/sl.dlss_g.dll
          ls -lh vendor/Streamline/bin/x64/sl.reflex.dll

      # ── Build ignis_rt.dll ─────────────────────────────────────
      - name: Configure CMake
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release `
            -DIGNIS_USE_NRD=OFF `
            -DIGNIS_USE_DLSS=ON `
            -DIGNIS_USE_STREAMLINE=ON `
            -DIGNIS_NGX_ROOT="${{ github.workspace }}/vendor/ngx_sdk" `
            -DIGNIS_STREAMLINE_ROOT="${{ github.workspace }}/vendor/Streamline"

      - name: Build
        run: cmake --build build --config Release

      # ── Package addon zip ───────────────────────────────────────
      - name: Assemble addon directory
        shell: bash
        run: |
          mkdir -p staging/ignis_rt/lib
          mkdir -p staging/ignis_rt/shaders

          # Python addon files + manifest + assets
          cp blender/ignis_rt/*.py   staging/ignis_rt/
          cp blender/ignis_rt/blender_manifest.toml staging/ignis_rt/
          cp -r blender/ignis_rt/icons staging/ignis_rt/ 2>/dev/null || true

          # DLL (built with DLSS support)
          cp build/Release/ignis_rt.dll staging/ignis_rt/lib/

          # DLSS runtime DLLs (from NVIDIA repo — redistribution allowed)
          cp vendor/DLSS/lib/Windows_x86_64/rel/nvngx_dlss.dll  staging/ignis_rt/lib/
          cp vendor/DLSS/lib/Windows_x86_64/rel/nvngx_dlssd.dll staging/ignis_rt/lib/

          # Streamline runtime DLLs (Frame Generation + Reflex — NVIDIA signed binaries)
          cp vendor/Streamline/bin/x64/sl.interposer.dll staging/ignis_rt/lib/
          cp vendor/Streamline/bin/x64/sl.common.dll     staging/ignis_rt/lib/
          cp vendor/Streamline/bin/x64/sl.dlss_g.dll     staging/ignis_rt/lib/
          cp vendor/Streamline/bin/x64/sl.reflex.dll     staging/ignis_rt/lib/
          cp vendor/Streamline/bin/x64/sl.pcl.dll        staging/ignis_rt/lib/

          # Compiled shaders + LUT files
          cp shaders/*.spv staging/ignis_rt/shaders/
          cp shaders/*.cube staging/ignis_rt/shaders/ 2>/dev/null || true
          mkdir -p staging/ignis_rt/shaders/wavefront
          cp shaders/wavefront/*.spv staging/ignis_rt/shaders/wavefront/ 2>/dev/null || true

          echo "=== Addon contents ==="
          find staging/ignis_rt -type f | sort

      # ── Inject version from release tag into manifest ──────────
      - name: Inject release version
        if: github.event_name == 'release'
        shell: bash
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          echo "Injecting version $VERSION into manifest"
          sed -i "s/^version = .*/version = \"$VERSION\"/" staging/ignis_rt/blender_manifest.toml

      - name: Create zip
        shell: bash
        run: |
          cd staging
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
            ZIP_NAME="ignis_rt_${TAG}.zip"
          else
            ZIP_NAME="ignis_rt_addon.zip"
          fi
          7z a -tzip ../$ZIP_NAME ignis_rt/
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV

      # ── Upload artifact (always — nightly or release) ──────────
      # Upload staging/ so GitHub's artifact zip contains ignis_rt/ folder.
      # Users download the artifact zip and install it directly in Blender
      # (the zip already has the correct ignis_rt/ structure).
      - name: Upload addon zip
        uses: actions/upload-artifact@v4
        with:
          name: ignis-rt-blender-addon
          path: staging/
          compression-level: 9

      # ── Attach zip to GitHub Release ───────────────────────────
      - name: Upload release asset
        if: github.event_name == 'release'
        shell: bash
        run: gh release upload "${{ github.event.release.tag_name }}" "$ZIP_NAME" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
