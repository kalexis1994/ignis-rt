name: Build Blender Addon

on:
  push:
    branches: [main]
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      # ── Vulkan SDK ──────────────────────────────────────────────
      - name: Install Vulkan SDK
        run: |
          $ver = "1.3.290.0"
          $url = "https://sdk.lunarg.com/sdk/download/$ver/windows/VulkanSDK-$ver-Installer.exe"
          Invoke-WebRequest -Uri $url -OutFile VulkanSDK.exe
          Start-Process -FilePath .\VulkanSDK.exe -Args "--accept-licenses --default-answer --confirm-command install" -Wait
          echo "VULKAN_SDK=C:\VulkanSDK\$ver" >> $env:GITHUB_ENV
          echo "C:\VulkanSDK\$ver\Bin" >> $env:GITHUB_PATH

      # ── DLSS SDK (headers + lib + runtime DLLs) ────────────────
      - name: Clone DLSS SDK
        shell: bash
        run: |
          git clone --depth 1 https://github.com/NVIDIA/DLSS.git vendor/DLSS
          echo "--- DLSS headers ---"
          ls vendor/DLSS/include/
          echo "--- DLSS libs ---"
          ls vendor/DLSS/lib/Windows_x86_64/x86_64/
          echo "--- DLSS DLLs ---"
          ls -lh vendor/DLSS/lib/Windows_x86_64/rel/

      # ── NRD SDK (build from source — MIT license) ──────────────
      - name: Clone and build NRD
        shell: bash
        run: |
          git clone --depth 1 https://github.com/NVIDIAGameWorks/NRD.git vendor/NRD
          cd vendor/NRD
          # NRD uses its own build script to prepare the SDK
          # First, update dependencies (ShaderMake, MathLib)
          git submodule update --init --recursive 2>/dev/null || true

      - name: Build NRD
        shell: cmd
        run: |
          cd vendor\NRD
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release
          if exist "build\Release\NRD.dll" (
            echo NRD.dll built successfully
          ) else (
            echo Checking for SDK layout...
            dir /s /b NRD.dll 2>nul || echo NRD.dll not found, checking _Bin...
            dir /s /b _Bin 2>nul || echo _Bin not found either
          )

      # Fallback: if NRD build puts DLL in non-standard location, find it
      - name: Locate NRD artifacts
        shell: bash
        run: |
          echo "--- Searching for NRD.lib ---"
          find vendor/NRD -name "NRD.lib" -type f 2>/dev/null || echo "NRD.lib not found"
          echo "--- Searching for NRD.dll ---"
          find vendor/NRD -name "NRD.dll" -type f 2>/dev/null || echo "NRD.dll not found"
          echo "--- Searching for NRD.h ---"
          find vendor/NRD -name "NRD.h" -path "*/Include/*" -type f 2>/dev/null || echo "NRD.h not found"

      # ── Prepare NGX SDK layout for CMake ───────────────────────
      # CMake expects: NGX_ROOT/include/ngx/*.h + NGX_ROOT/lib/nvsdk_ngx_d.lib
      - name: Prepare NGX SDK layout
        shell: bash
        run: |
          mkdir -p vendor/ngx_sdk/include/ngx
          mkdir -p vendor/ngx_sdk/lib
          cp vendor/DLSS/include/*.h vendor/ngx_sdk/include/ngx/
          cp vendor/DLSS/include/nvsdk_ngx_helpers_dlssd*.h vendor/ngx_sdk/include/ngx/ 2>/dev/null || true
          # Stub lib for linker
          cp vendor/DLSS/lib/Windows_x86_64/x86_64/nvsdk_ngx_d.lib vendor/ngx_sdk/lib/
          echo "--- NGX SDK layout ---"
          find vendor/ngx_sdk -type f | head -20

      # ── Build ignis_rt.dll (with DLSS + NRD) ──────────────────
      - name: Configure CMake
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release `
            -DIGNIS_USE_NRD=ON `
            -DIGNIS_USE_DLSS=ON `
            -DIGNIS_NRD_ROOT="${{ github.workspace }}/vendor/NRD" `
            -DIGNIS_NGX_ROOT="${{ github.workspace }}/vendor/ngx_sdk"

      - name: Build
        run: cmake --build build --config Release

      # ── Package addon zip ───────────────────────────────────────
      - name: Assemble addon directory
        shell: bash
        run: |
          mkdir -p staging/ignis_rt/lib
          mkdir -p staging/ignis_rt/shaders

          # Python addon files + manifest + assets
          cp blender/ignis_rt/*.py   staging/ignis_rt/
          cp blender/ignis_rt/blender_manifest.toml staging/ignis_rt/ 2>/dev/null || true
          cp -r blender/ignis_rt/icons staging/ignis_rt/ 2>/dev/null || true

          # DLL (built with DLSS + NRD support)
          cp build/Release/ignis_rt.dll staging/ignis_rt/lib/

          # DLSS runtime DLLs (from NVIDIA repo — redistribution allowed)
          cp vendor/DLSS/lib/Windows_x86_64/rel/nvngx_dlss.dll  staging/ignis_rt/lib/
          cp vendor/DLSS/lib/Windows_x86_64/rel/nvngx_dlssd.dll staging/ignis_rt/lib/

          # NRD runtime DLL (MIT license)
          find vendor/NRD -name "NRD.dll" -type f -exec cp {} staging/ignis_rt/lib/ \; 2>/dev/null
          ls -lh staging/ignis_rt/lib/NRD.dll 2>/dev/null || echo "WARNING: NRD.dll not found"

          # Compiled shaders
          cp shaders/*.spv staging/ignis_rt/shaders/
          mkdir -p staging/ignis_rt/shaders/wavefront
          cp shaders/wavefront/*.spv staging/ignis_rt/shaders/wavefront/ 2>/dev/null || true

          echo "=== Addon contents ==="
          find staging/ignis_rt -type f | sort

      # ── Inject version from release tag into manifest ──────────
      - name: Inject release version
        if: github.event_name == 'release'
        shell: bash
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          echo "Injecting version $VERSION into manifest"
          sed -i "s/^version = .*/version = \"$VERSION\"/" staging/ignis_rt/blender_manifest.toml

      - name: Create zip
        shell: bash
        run: |
          cd staging
          7z a -tzip ../ignis_rt_addon.zip ignis_rt/

      # ── Upload artifact (always — nightly or release) ──────────
      - name: Upload addon zip
        uses: actions/upload-artifact@v4
        with:
          name: ignis-rt-blender-addon
          path: ignis_rt_addon.zip

      # ── Attach zip to GitHub Release ───────────────────────────
      - name: Upload release asset
        if: github.event_name == 'release'
        shell: bash
        run: gh release upload "${{ github.event.release.tag_name }}" ignis_rt_addon.zip --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
